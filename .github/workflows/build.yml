name: Build and Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0, v5.0 等标签时触发
  workflow_dispatch:   # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name=OpenCore_Ultra_v5.0 --add-data "core;core" --add-data "ui;ui" --hidden-import=tkinter --hidden-import=requests opencore_tool.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCore_Ultra_Windows
          path: dist/OpenCore_Ultra_v5.0.exe

      - name: Create Release and Upload EXE
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/OpenCore_Ultra_v5.0.exe
          generate_release_notes: true
          name: "OpenCore Ultra ${{ github.ref_name }}"
          body: |
            ## OpenCore Ultra v${{ github.ref_name }}
            
            ### 下载说明
            - 下载 `OpenCore_Ultra_v5.0.exe` 即可运行
            - 无需安装任何依赖，双击即可使用
            
            ### 功能特点
            - ✅ 50+ 刷机与维护功能
            - ✅ ADB/Fastboot/EDL 三模式支持
            - ✅ 命令行 + 图形界面双模式
            - ✅ 字库级备份与恢复
            - ✅ Magisk 修补与模块管理
            - ✅ 救砖模式与安全擦除
            
            ### 使用方法
            1. 下载 EXE 文件
            2. 双击运行
            3. 输入 `--gui` 启动图形界面，或直接运行进入命令行模式

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name=OpenCore_Ultra_v5.0 --add-data "core:core" --add-data "ui:ui" --hidden-import=tkinter --hidden-import=requests opencore_tool.py

      - name: Upload Linux executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCore_Ultra_Linux
          path: dist/OpenCore_Ultra_v5.0

      - name: Create Release and Upload Linux executable
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/OpenCore_Ultra_v5.0
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS executable
        run: |
          pyinstaller --onefile --name=OpenCore_Ultra_v5.0 --add-data "core:core" --add-data "ui:ui" --hidden-import=tkinter --hidden-import=requests opencore_tool.py

      - name: Upload macOS executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCore_Ultra_macOS
          path: dist/OpenCore_Ultra_v5.0

      - name: Create Release and Upload macOS executable
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/OpenCore_Ultra_v5.0
          generate_release_notes: true
